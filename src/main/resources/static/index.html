<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Threads Network Analysis</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
        <style>
            #cy { width: 100%; height: 400px; border: 1px solid #ccc; display: block; background: #f9f9f9; border-radius: 8px; }
            body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: auto; }
            button {
                background-color: #007bff; color: white; border: none; padding: 12px 20px;
                cursor: pointer; border-radius: 5px; box-shadow: 0 0 5px cyan; transition: 0.3s;
                font-weight: bold; width: 100%;
            }
            button:hover {
                box-shadow: 0 0 15px cyan, 0 0 30px cyan;
                transform: scale(1.02);
            }
            #result { margin-top: 20px; font-weight: bold; color: #2c3e50; padding: 10px; background: #eef; border-radius: 5px; }
        </style>
    </head>
    <body>
        <h1>Threads Connection Finder</h1>
        <div id="cy"></div>
        <br>
        <button onclick="findPath()">Find Path: Alice to Frank</button>
        <p id="result">Click the button to see the shortest path logic.</p>

        <script>
            // Initialize Cytoscape with your Java GraphService data
            var cy = cytoscape({
                container: document.getElementById('cy'),
                elements: [
                    // Nodes (Vertices from GraphService.java)
                    { data: { id: 'Alice' } }, { data: { id: 'Bob' } },
                    { data: { id: 'Charlie' } }, { data: { id: 'Dan' } },
                    { data: { id: 'Eve' } }, { data: { id: 'Frank' } },

                    // Edges (Follows from GraphService.java)
                    { data: { source: 'Alice', target: 'Bob' } },
                    { data: { source: 'Bob', target: 'Charlie' } },
                    { data: { source: 'Charlie', target: 'Dan' } },
                    { data: { source: 'Alice', target: 'Dan' } },
                    { data: { source: 'Dan', target: 'Charlie' } },
                    { data: { source: 'Charlie', target: 'Eve' } },
                    { data: { source: 'Eve', target: 'Alice' } },
                    { data: { source: 'Alice', target: 'Frank' } }, 
                    { data: { source: 'Charlie', target: 'Frank' } },
                ],
                style: [
                    { selector: 'node', style: { 'label': 'data(id)', 
                    'background-color': '#007bff', 'color': '#fff', 'text-valign': 'center', 'text-halign': 'center','font-size': '12px',
                    'width': 'label',      // Makes the circle as wide as the name
                    'height': 'label',     // Makes the circle as tall as the name
                    'padding': '15px'      // Adds breathing room so text doesn't touch the edges
                        } 
                    },
                    { 
                        selector: 'edge', 
                        style: { 'width': 2, 'line-color': '#ccc', 'target-arrow-color': '#ccc', 'target-arrow-shape': 'triangle', 
                        'curve-style': 'bezier','control-point-step-size': 40 // Prevents overlapping lines from Alice/Dan/Charlie
                        } 
                    }
                ],
                layout: { name: 'grid', rows: 2 }
                });

            async function findPath() {
                const resultElement = document.getElementById('result');
                resultElement.innerText = "Querying Dijkstra Algorithm...";

                try {
                    // Matches getPath(String start, String end) in your Java code
                    const response = await fetch('http://localhost:8080/api/path?start=Alice&end=Frank');
                    
                    if (!response.ok) throw new Error("Path not found");

                    const path = await response.json(); 
                    resultElement.innerText = "Shortest Path: " + path.join(" --> ");
                    
                    // Optional: Highlight the path in the UI
                    path.forEach(nodeId => {
                        cy.nodes(`[id="${nodeId}"]`).style('background-color', 'cyan');
                    });
                } catch (error) {
                    resultElement.innerText = "Error: Check if your Spring Backend is running on port 8080!";
                }
            } 
        </script>
    </body>
</html>
